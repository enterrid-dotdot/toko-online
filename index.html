<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toko — Belanja Online</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700;9..144,900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://app.sandbox.midtrans.com/snap/snap.js" data-client-key="MIDTRANS_CLIENT_KEY_PLACEHOLDER" id="midtrans-script"></script>
<style>
  :root{
    --cream:#FBF7EE;
    --forest:#1F3D2B;
    --forest-dark:#122318;
    --forest-light:#2E5A3F;
    --turmeric:#E8A33D;
    --turmeric-dark:#B9741F;
    --turmeric-light:#F4C878;
    --clay:#C1502E;
    --sage:#E7EEE2;
    --ink:#241F17;
    --paper:#FFFFFF;
    --line:#E6DDC7;
    --muted:#877E67;
    --radius:16px;
    --shadow-sm:0 2px 8px rgba(31,61,43,0.06);
    --shadow-md:0 10px 30px rgba(31,61,43,0.12);
    --shadow-lg:0 20px 50px rgba(18,35,24,0.18);
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{margin:0;font-family:'Plus Jakarta Sans',sans-serif;background:var(--cream);color:var(--ink);-webkit-font-smoothing:antialiased;}
  h1,h2,h3,.display{font-family:'Fraunces',serif;}
  .mono{font-family:'JetBrains Mono',monospace;}
  a{color:inherit;text-decoration:none;}
  ::selection{background:var(--turmeric-light);}

  header{
    position:sticky;top:0;z-index:30;
    background:var(--forest);color:var(--cream);
    padding:13px 20px;display:flex;align-items:center;justify-content:space-between;
    box-shadow:0 4px 20px rgba(18,35,24,0.15);
  }
  header .brand{display:flex;align-items:center;gap:11px;}
  header .brand-mark{
    width:36px;height:36px;border-radius:10px;
    background:linear-gradient(145deg,var(--turmeric-light),var(--turmeric-dark));
    display:flex;align-items:center;justify-content:center;font-weight:900;color:var(--forest-dark);
    font-family:'Fraunces',serif;font-size:17px;box-shadow:inset 0 -2px 4px rgba(0,0,0,0.15);
  }
  header h1{font-size:19px;margin:0;font-weight:700;letter-spacing:-0.02em;}
  header .cart-btn{
    position:relative;background:var(--turmeric);color:var(--forest-dark);border:none;
    padding:10px 18px;border-radius:100px;font-weight:700;font-size:14px;cursor:pointer;
    display:flex;align-items:center;gap:7px;box-shadow:0 3px 10px rgba(0,0,0,0.15);
    transition:transform .15s ease;
  }
  header .cart-btn:active{transform:scale(0.96);}
  header .cart-btn .badge{
    position:absolute;top:-7px;right:-7px;background:var(--clay);color:#fff;
    font-size:11px;min-width:19px;height:19px;border-radius:100px;display:flex;align-items:center;justify-content:center;
    font-family:'JetBrains Mono',monospace;font-weight:700;border:2px solid var(--cream);
  }

  .hero-carousel{position:relative;max-width:1140px;margin:16px auto 0;padding:0 16px;}
  .hero-viewport{position:relative;border-radius:20px;overflow:hidden;box-shadow:var(--shadow-lg);aspect-ratio:16/8;background:var(--forest);}
  @media (max-width:640px){.hero-viewport{aspect-ratio:4/5;}}
  .hero-slide{
    position:absolute;inset:0;opacity:0;transition:opacity .6s ease;
    background-size:cover;background-position:center;display:flex;align-items:flex-end;
  }
  .hero-slide.active{opacity:1;z-index:1;}
  .hero-slide::after{
    content:'';position:absolute;inset:0;
    background:linear-gradient(0deg, rgba(18,35,24,0.88) 0%, rgba(18,35,24,0.35) 55%, rgba(18,35,24,0.05) 100%);
  }
  .hero-content{position:relative;z-index:2;padding:32px 36px;max-width:560px;color:var(--cream);}
  .hero-content .eyebrow{
    font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.1em;text-transform:uppercase;
    color:var(--turmeric-light);margin-bottom:10px;display:inline-block;
    background:rgba(232,163,61,0.15);padding:4px 12px;border-radius:100px;border:1px solid rgba(232,163,61,0.3);
  }
  .hero-content h2{font-size:clamp(24px,4.2vw,40px);margin:0 0 10px;font-weight:700;line-height:1.12;}
  .hero-content p{font-size:14.5px;opacity:0.88;margin:0 0 18px;max-width:440px;line-height:1.5;}
  .hero-cta{
    display:inline-flex;align-items:center;gap:8px;background:var(--turmeric);color:var(--forest-dark);
    padding:12px 22px;border-radius:100px;font-weight:700;font-size:14px;border:none;cursor:pointer;
    box-shadow:0 6px 18px rgba(0,0,0,0.25);transition:transform .15s ease;
  }
  .hero-cta:hover{transform:translateY(-2px);}
  .hero-dots{position:absolute;bottom:16px;right:20px;z-index:3;display:flex;gap:6px;}
  .hero-dot{width:7px;height:7px;border-radius:100px;background:rgba(255,255,255,0.4);cursor:pointer;transition:all .25s ease;}
  .hero-dot.active{background:var(--turmeric);width:22px;}
  .hero-arrow{
    position:absolute;top:50%;transform:translateY(-50%);z-index:3;background:rgba(251,247,238,0.85);
    border:none;width:36px;height:36px;border-radius:100px;cursor:pointer;font-size:16px;color:var(--forest-dark);
    display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-sm);
  }
  .hero-arrow.prev{left:16px;} .hero-arrow.next{right:16px;}
  @media (max-width:640px){.hero-arrow{display:none;} .hero-content{padding:24px 22px;}}

  .searchbar{max-width:1140px;margin:22px auto 0;padding:0 20px;}
  .searchbar-inner{position:relative;}
  .searchbar input{
    width:100%;padding:14px 16px 14px 44px;border-radius:100px;border:1.5px solid var(--line);
    font-size:14.5px;font-family:inherit;background:var(--paper);box-shadow:var(--shadow-sm);
  }
  .searchbar input:focus{outline:2px solid var(--turmeric);border-color:transparent;}
  .searchbar-inner::before{
    content:'⌕';position:absolute;left:17px;top:50%;transform:translateY(-50%);font-size:18px;color:var(--muted);font-weight:700;
  }

  .cats{max-width:1140px;margin:0 auto;padding:16px 20px 8px;display:flex;gap:9px;overflow-x:auto;scrollbar-width:none;}
  .cats::-webkit-scrollbar{display:none;}
  .cat-chip{
    flex-shrink:0;padding:9px 18px;border-radius:100px;background:var(--paper);border:1.5px solid var(--line);
    font-size:13.5px;font-weight:700;cursor:pointer;color:var(--ink);white-space:nowrap;transition:all .15s ease;
  }
  .cat-chip.active{background:var(--forest);border-color:var(--forest);color:var(--cream);box-shadow:0 4px 12px rgba(31,61,43,0.25);}

  .section-label{max-width:1140px;margin:26px auto 14px;padding:0 20px;display:flex;align-items:baseline;gap:10px;}
  .section-label h3{font-size:20px;margin:0;color:var(--forest-dark);font-weight:700;}
  .section-label span{font-size:12.5px;color:var(--muted);font-family:'JetBrains Mono',monospace;}

  .grid{
    max-width:1140px;margin:0 auto;padding:0 20px 90px;
    display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:16px;
  }
  .card{
    background:var(--paper);border-radius:var(--radius);overflow:hidden;border:1px solid var(--line);
    display:flex;flex-direction:column;position:relative;transition:transform .18s ease, box-shadow .18s ease;
  }
  .card:hover{transform:translateY(-4px);box-shadow:var(--shadow-md);}
  .card .imgwrap{aspect-ratio:1;background:var(--sage);overflow:hidden;position:relative;}
  .card img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .35s ease;}
  .card:hover img{transform:scale(1.06);}
  .card .ribbon{
    position:absolute;top:10px;left:-6px;background:var(--clay);color:#fff;font-size:10.5px;font-weight:800;
    padding:4px 12px 4px 14px;letter-spacing:0.02em;text-transform:uppercase;box-shadow:0 2px 6px rgba(0,0,0,0.2);
    border-radius:0 4px 4px 0;
  }
  .card .ribbon::after{
    content:'';position:absolute;left:0;bottom:-5px;border-left:6px solid transparent;border-top:5px solid #7a2f18;
  }
  .card .discount-badge{
    position:absolute;top:10px;right:10px;background:var(--forest-dark);color:var(--turmeric-light);
    font-size:11px;font-weight:800;padding:4px 8px;border-radius:7px;font-family:'JetBrains Mono',monospace;
  }
  .card .body{padding:13px 13px 15px;display:flex;flex-direction:column;gap:6px;flex:1;}
  .card .name{font-size:13.5px;font-weight:600;line-height:1.32;min-height:35px;color:var(--ink);}
  .card .price-row{display:flex;align-items:baseline;gap:7px;flex-wrap:wrap;margin-top:2px;}
  .card .tag{
    font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:var(--forest-dark);
  }
  .card .original-price{
    font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--muted);text-decoration:line-through;
  }
  .card .stock{font-size:11px;color:var(--muted);}
  .card .stock.low{color:var(--clay);font-weight:600;}
  .card .addbtn{
    margin-top:auto;background:var(--forest);color:var(--cream);border:none;padding:10px;
    border-radius:10px;font-weight:700;font-size:13px;cursor:pointer;transition:background .15s ease;
  }
  .card .addbtn:hover{background:var(--forest-light);}
  .card .addbtn:disabled{background:#D8D0BA;color:#a89f88;cursor:not-allowed;}
  .card .addbtn:active{transform:scale(0.98);}

  .empty{max-width:1140px;margin:60px auto;text-align:center;color:var(--muted);padding:0 20px;}

  .overlay{position:fixed;inset:0;background:rgba(18,35,24,0.45);z-index:40;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(1px);}
  .overlay.show{opacity:1;pointer-events:auto;}
  .drawer{
    position:fixed;top:0;right:0;height:100%;width:min(430px,100%);background:var(--cream);z-index:50;
    transform:translateX(100%);transition:transform .3s cubic-bezier(.2,.8,.2,1);display:flex;flex-direction:column;
    box-shadow:-10px 0 40px rgba(0,0,0,0.15);
  }
  .drawer.show{transform:translateX(0);}
  .drawer-head{padding:20px;background:var(--forest);color:var(--cream);display:flex;justify-content:space-between;align-items:center;}
  .drawer-head h3{margin:0;font-size:18px;font-weight:700;}
  .drawer-head button{background:rgba(255,255,255,0.12);border:none;color:var(--cream);font-size:16px;cursor:pointer;width:30px;height:30px;border-radius:100px;}
  .drawer-items{flex:1;overflow-y:auto;padding:18px 20px;display:flex;flex-direction:column;gap:12px;}
  .citem{display:flex;gap:11px;background:var(--paper);border-radius:12px;padding:11px;border:1px solid var(--line);}
  .citem img{width:58px;height:58px;border-radius:9px;object-fit:cover;background:var(--sage);}
  .citem .info{flex:1;display:flex;flex-direction:column;gap:4px;}
  .citem .info .n{font-size:13px;font-weight:600;}
  .citem .info .p{font-family:'JetBrains Mono',monospace;font-size:12.5px;color:var(--forest-dark);font-weight:600;}
  .qty{display:flex;align-items:center;gap:9px;}
  .qty button{width:25px;height:25px;border-radius:7px;border:1px solid var(--line);background:var(--sage);cursor:pointer;font-weight:700;}
  .qty span{font-family:'JetBrains Mono',monospace;font-size:13px;min-width:16px;text-align:center;font-weight:700;}
  .rm{background:none;border:none;color:var(--clay);font-size:12px;cursor:pointer;align-self:flex-start;padding:0;margin-top:2px;font-weight:600;}

  .drawer-foot{padding:20px;border-top:1px solid var(--line);background:var(--paper);}
  .totalrow{display:flex;justify-content:space-between;font-size:15px;margin-bottom:14px;font-weight:700;}
  .totalrow .amt{font-family:'JetBrains Mono',monospace;color:var(--forest-dark);}
  .btn-primary{
    width:100%;background:var(--turmeric);color:var(--forest-dark);border:none;padding:14px;
    border-radius:12px;font-weight:800;font-size:15px;cursor:pointer;transition:transform .15s ease;box-shadow:0 6px 16px rgba(232,163,61,0.35);
  }
  .btn-primary:hover:not(:disabled){transform:translateY(-1px);}
  .btn-primary:disabled{background:#D8D0BA;color:#a89f88;box-shadow:none;cursor:not-allowed;}

  .modal-overlay{position:fixed;inset:0;background:rgba(18,35,24,0.5);z-index:60;display:none;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(2px);}
  .modal-overlay.show{display:flex;}
  .modal{background:var(--cream);border-radius:18px;max-width:440px;width:100%;max-height:88vh;overflow-y:auto;box-shadow:var(--shadow-lg);}
  .modal-head{padding:20px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;}
  .modal-head h3{margin:0;font-size:17px;font-weight:700;}
  .modal-body{padding:20px 22px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12.5px;font-weight:700;margin-bottom:6px;color:var(--muted);}
  .field input,.field textarea{
    width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid var(--line);font-family:inherit;font-size:14px;background:var(--paper);
  }
  .field textarea{resize:vertical;min-height:60px;}
  .field input:focus,.field textarea:focus{outline:2px solid var(--turmeric);border-color:transparent;}

  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(120%);z-index:70;
    background:var(--forest-dark);color:var(--cream);padding:13px 22px;border-radius:100px;font-size:13.5px;font-weight:700;
    transition:transform .3s cubic-bezier(.2,.8,.2,1);box-shadow:0 10px 30px rgba(0,0,0,0.25);
  }
  .toast.show{transform:translateX(-50%) translateY(0);}

  footer{max-width:1140px;margin:30px auto 0;padding:30px 20px 40px;border-top:1px solid var(--line);}
  .footer-inner{display:flex;justify-content:space-between;flex-wrap:wrap;gap:16px;align-items:center;}
  footer .fbrand{font-family:'Fraunces',serif;font-weight:700;font-size:16px;color:var(--forest-dark);}
  footer .fmeta{color:var(--muted);font-size:12.5px;}
  footer .wa-link{color:var(--forest);font-weight:700;font-size:13px;}

  .skeleton{background:linear-gradient(90deg,var(--sage) 25%,#f3f7f0 37%,var(--sage) 63%);background-size:400% 100%;animation:sk 1.4s ease infinite;}
  @keyframes sk{0%{background-position:100% 50%}100%{background-position:0 50%}}
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-mark">T</div>
    <h1 id="storeName">Toko Saya</h1>
  </div>
  <button class="cart-btn" onclick="openCart()">
    Keranjang <span class="badge" id="cartBadge">0</span>
  </button>
</header>

<div class="hero-carousel">
  <div class="hero-viewport" id="heroViewport"></div>
  <div class="hero-dots" id="heroDots"></div>
  <button class="hero-arrow prev" onclick="heroPrev()">‹</button>
  <button class="hero-arrow next" onclick="heroNext()">›</button>
</div>

<div class="searchbar">
  <div class="searchbar-inner">
    <input type="text" id="searchInput" placeholder="Cari produk..." oninput="renderProducts()">
  </div>
</div>

<div class="cats" id="catBar"></div>

<div class="section-label"><h3>Semua Produk</h3><span id="productCount"></span></div>

<div class="grid" id="productGrid">
  <div class="card"><div class="imgwrap skeleton"></div><div class="body"><div style="height:14px;width:80%;background:var(--sage);border-radius:4px;"></div></div></div>
  <div class="card"><div class="imgwrap skeleton"></div><div class="body"><div style="height:14px;width:80%;background:var(--sage);border-radius:4px;"></div></div></div>
  <div class="card"><div class="imgwrap skeleton"></div><div class="body"><div style="height:14px;width:80%;background:var(--sage);border-radius:4px;"></div></div></div>
  <div class="card"><div class="imgwrap skeleton"></div><div class="body"><div style="height:14px;width:80%;background:var(--sage);border-radius:4px;"></div></div></div>
</div>

<footer>
  <div class="footer-inner">
    <div class="fbrand" id="footerStoreName">Toko Saya</div>
    <div class="fmeta">© <span id="year"></span> — Belanja aman &amp; langsung diproses</div>
    <a class="wa-link" id="waLink" href="#" target="_blank" style="display:none;">💬 Hubungi via WhatsApp</a>
  </div>
</footer>

<div class="overlay" id="overlay" onclick="closeCart()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-head">
    <h3>Keranjang</h3>
    <button onclick="closeCart()">✕</button>
  </div>
  <div class="drawer-items" id="cartItems"></div>
  <div class="drawer-foot">
    <div class="totalrow"><span>Total</span><span class="amt" id="cartTotal">Rp 0</span></div>
    <button class="btn-primary" id="checkoutBtn" onclick="openCheckout()" disabled>Checkout</button>
  </div>
</div>

<div class="modal-overlay" id="checkoutOverlay">
  <div class="modal">
    <div class="modal-head">
      <h3>Data Pengiriman</h3>
      <button onclick="closeCheckout()" style="background:none;border:none;font-size:18px;cursor:pointer;">✕</button>
    </div>
    <div class="modal-body">
      <div class="field"><label>Nama Lengkap</label><input type="text" id="custName" placeholder="Nama kamu"></div>
      <div class="field"><label>No. WhatsApp</label><input type="tel" id="custPhone" placeholder="08xxxxxxxxxx"></div>
      <div class="field"><label>Alamat Lengkap</label><textarea id="custAddress" placeholder="Alamat pengiriman lengkap"></textarea></div>
      <div class="totalrow" style="margin-top:6px;"><span>Total Bayar</span><span class="amt" id="checkoutTotal">Rp 0</span></div>
      <button class="btn-primary" id="payBtn" onclick="startPayment()">Bayar Sekarang</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDXdRPXmbkZYg_O0Zjywot_KgKbphZDUW4",
  authDomain: "admin-toko-markethub.firebaseapp.com",
  projectId: "admin-toko-markethub",
  storageBucket: "admin-toko-markethub.firebasestorage.app",
  messagingSenderId: "559215474209",
  appId: "1:559215474209:web:6049bcb46f5165ba3ad560"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

document.getElementById('year').textContent = new Date().getFullYear();

let products = [];
let cart = JSON.parse(localStorage.getItem('cart_v1') || '{}');
let activeCat = 'Semua';
let banners = [];
let heroIndex = 0;
let heroTimer = null;

function fmtRupiah(n){ return 'Rp ' + Number(n).toLocaleString('id-ID'); }
function saveCart(){ localStorage.setItem('cart_v1', JSON.stringify(cart)); }
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

const defaultBanner = {
  image: 'https://images.unsplash.com/photo-1542838132-92c53300491e?w=1200&q=80',
  eyebrow: 'Belanja langsung, tanpa ribet',
  title: 'Semua kebutuhan, satu keranjang.',
  subtitle: 'Pilih produk, checkout, bayar langsung — pesanan diproses begitu pembayaran masuk.',
  buttonText: 'Belanja Sekarang',
  buttonLink: '#productGrid'
};

db.collection('settings').doc('store').get().then(doc=>{
  if(doc.exists){
    const d = doc.data();
    if(d.name){
      document.getElementById('storeName').textContent = d.name;
      document.getElementById('footerStoreName').textContent = d.name;
      document.title = d.name + ' — Belanja Online';
    }
    if(d.waNumber){
      const wa = document.getElementById('waLink');
      wa.href = 'https://wa.me/' + d.waNumber.replace(/[^0-9]/g,'');
      wa.style.display = 'inline-block';
    }
  }
}).catch(()=>{});

db.collection('banners').where('active','==',true).orderBy('order','asc').get().then(snap=>{
  banners = snap.docs.map(d=>({id:d.id, ...d.data()}));
  if(banners.length===0) banners = [defaultBanner];
  renderHero();
  startHeroAutoplay();
}).catch(()=>{
  banners = [defaultBanner];
  renderHero();
});

function renderHero(){
  const vp = document.getElementById('heroViewport');
  vp.innerHTML = banners.map((b,i)=>`
    <div class="hero-slide ${i===heroIndex?'active':''}" style="background-image:url('${b.image}')">
      <div class="hero-content">
        <span class="eyebrow">${b.eyebrow||''}</span>
        <h2>${b.title||''}</h2>
        <p>${b.subtitle||''}</p>
        ${b.buttonText ? `<a class="hero-cta" href="${b.buttonLink||'#productGrid'}">${b.buttonText} →</a>` : ''}
      </div>
    </div>
  `).join('');
  const dots = document.getElementById('heroDots');
  dots.innerHTML = banners.map((b,i)=>`<div class="hero-dot ${i===heroIndex?'active':''}" onclick="heroGoTo(${i})"></div>`).join('');
  if(banners.length<=1) document.getElementById('heroDots').style.display='none';
}
function heroGoTo(i){ heroIndex = i; renderHero(); resetHeroAutoplay(); }
function heroNext(){ heroIndex = (heroIndex+1)%banners.length; renderHero(); resetHeroAutoplay(); }
function heroPrev(){ heroIndex = (heroIndex-1+banners.length)%banners.length; renderHero(); resetHeroAutoplay(); }
function startHeroAutoplay(){ if(banners.length>1) heroTimer = setInterval(heroNext, 5000); }
function resetHeroAutoplay(){ clearInterval(heroTimer); startHeroAutoplay(); }

db.collection('products').where('active','==',true).onSnapshot(snap=>{
  products = snap.docs.map(d=>({id:d.id, ...d.data()}));
  renderCats();
  renderProducts();
}, err=>{
  document.getElementById('productGrid').innerHTML = '<div class="empty">Gagal memuat produk. Cek koneksi Firebase.</div>';
  console.error(err);
});

function renderCats(){
  const cats = ['Semua', ...new Set(products.map(p=>p.category).filter(Boolean))];
  const bar = document.getElementById('catBar');
  bar.innerHTML = cats.map(c=>`<div class="cat-chip ${c===activeCat?'active':''}" onclick="setCat('${c.replace(/'/g,"\\'")}')">${c}</div>`).join('');
}
function setCat(c){ activeCat = c; renderCats(); renderProducts(); }

function renderProducts(){
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  let list = products.filter(p=>{
    const matchCat = activeCat==='Semua' || p.category===activeCat;
    const matchQ = !q || (p.name||'').toLowerCase().includes(q);
    return matchCat && matchQ;
  });
  document.getElementById('productCount').textContent = list.length + ' item';
  const grid = document.getElementById('productGrid');
  if(list.length===0){ grid.innerHTML = '<div class="empty">Produk tidak ditemukan.</div>'; return; }
  grid.innerHTML = list.map(p=>{
    const out = (p.stock||0) <= 0;
    const low = !out && (p.stock||0) <= 5;
    const hasDiscount = p.originalPrice && p.originalPrice > p.price;
    const discountPct = hasDiscount ? Math.round((1 - p.price/p.originalPrice)*100) : 0;
    return `
    <div class="card">
      <div class="imgwrap">
        ${p.badge ? `<div class="ribbon">${p.badge}</div>` : ''}
        ${hasDiscount ? `<div class="discount-badge">-${discountPct}%</div>` : ''}
        <img src="${p.image || 'https://placehold.co/300x300/E7EEE2/1F3D2B?text=%20'}" alt="${p.name}" loading="lazy">
      </div>
      <div class="body">
        <div class="name">${p.name}</div>
        <div class="price-row">
          <div class="tag">${fmtRupiah(p.price)}</div>
          ${hasDiscount ? `<div class="original-price">${fmtRupiah(p.originalPrice)}</div>` : ''}
        </div>
        <div class="stock ${low?'low':''}">${out ? 'Stok habis' : low ? 'Sisa '+p.stock : 'Stok: '+p.stock}</div>
        <button class="addbtn" ${out?'disabled':''} onclick="addToCart('${p.id}')">${out?'Habis':'+ Tambah'}</button>
      </div>
    </div>`;
  }).join('');
}

function addToCart(id){
  cart[id] = (cart[id]||0) + 1;
  saveCart(); updateCartUI();
  showToast('Ditambahkan ke keranjang');
}
function changeQty(id, delta){
  cart[id] = (cart[id]||0) + delta;
  if(cart[id] <= 0) delete cart[id];
  saveCart(); updateCartUI();
}
function removeFromCart(id){ delete cart[id]; saveCart(); updateCartUI(); }

function cartCount(){ return Object.values(cart).reduce((a,b)=>a+b,0); }
function cartTotalValue(){
  return Object.entries(cart).reduce((sum,[id,qty])=>{
    const p = products.find(x=>x.id===id);
    return sum + (p ? p.price*qty : 0);
  },0);
}

function updateCartUI(){
  document.getElementById('cartBadge').textContent = cartCount();
  const wrap = document.getElementById('cartItems');
  const entries = Object.entries(cart);
  if(entries.length===0){
    wrap.innerHTML = '<div class="empty" style="margin:30px 0;">Keranjang masih kosong.</div>';
    document.getElementById('checkoutBtn').disabled = true;
  } else {
    wrap.innerHTML = entries.map(([id,qty])=>{
      const p = products.find(x=>x.id===id);
      if(!p) return '';
      return `
      <div class="citem">
        <img src="${p.image || 'https://placehold.co/100/E7EEE2/1F3D2B?text=%20'}">
        <div class="info">
          <div class="n">${p.name}</div>
          <div class="p">${fmtRupiah(p.price)}</div>
          <div class="qty">
            <button onclick="changeQty('${id}',-1)">−</button>
            <span>${qty}</span>
            <button onclick="changeQty('${id}',1)">+</button>
          </div>
        </div>
        <button class="rm" onclick="removeFromCart('${id}')">Hapus</button>
      </div>`;
    }).join('');
    document.getElementById('checkoutBtn').disabled = false;
  }
  const total = cartTotalValue();
  document.getElementById('cartTotal').textContent = fmtRupiah(total);
  document.getElementById('checkoutTotal').textContent = fmtRupiah(total);
}

function openCart(){ document.getElementById('drawer').classList.add('show'); document.getElementById('overlay').classList.add('show'); }
function closeCart(){ document.getElementById('drawer').classList.remove('show'); document.getElementById('overlay').classList.remove('show'); }
function openCheckout(){
  if(cartCount()===0) return;
  closeCart();
  document.getElementById('checkoutOverlay').classList.add('show');
}
function closeCheckout(){ document.getElementById('checkoutOverlay').classList.remove('show'); }

async function startPayment(){
  const name = document.getElementById('custName').value.trim();
  const phone = document.getElementById('custPhone').value.trim();
  const address = document.getElementById('custAddress').value.trim();
  if(!name || !phone || !address){ showToast('Lengkapi semua data dulu ya'); return; }

  const items = Object.entries(cart).map(([id,qty])=>{
    const p = products.find(x=>x.id===id);
    return { id, name: p.name, price: p.price, qty };
  });
  const total = cartTotalValue();
  const orderId = 'ORD-' + Date.now();

  const payBtn = document.getElementById('payBtn');
  payBtn.disabled = true; payBtn.textContent = 'Memproses...';

  try{
    await db.collection('orders').doc(orderId).set({
      orderId, customerName: name, phone, address, items, total,
      status: 'pending', createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    const res = await fetch('/.netlify/functions/create-transaction', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ orderId, total, customerName: name, phone, items })
    });
    const data = await res.json();
    if(!data.token) throw new Error(data.error || 'Gagal membuat transaksi');

    window.snap.pay(data.token, {
      onSuccess: function(){
        cart = {}; saveCart(); updateCartUI();
        closeCheckout();
        showToast('Pembayaran berhasil! Pesanan sedang diproses.');
      },
      onPending: function(){
        cart = {}; saveCart(); updateCartUI();
        closeCheckout();
        showToast('Menunggu pembayaran kamu.');
      },
      onError: function(){ showToast('Pembayaran gagal, coba lagi.'); },
      onClose: function(){ showToast('Kamu menutup jendela pembayaran.'); }
    });
  }catch(e){
    console.error(e);
    showToast('Terjadi kesalahan: ' + e.message);
  }finally{
    payBtn.disabled = false; payBtn.textContent = 'Bayar Sekarang';
  }
}

updateCartUI();
</script>
</body>
